<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掲示板アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>掲示板アプリ</h1>
    <input type="text" id="name" placeholder="名前">
    <textarea name="message" id="message" placeholder="メッセージを入力"></textarea>
    <button id="postBtn">投稿する</button>
    <input type="text" id="searchInput" placeholder="投稿を検索">

    <div id="posts"></div>
  </div>



  <script src="js/main.js"></script>
</body>
</html>
